apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai-sdk-demo-ui
  labels:
    app: openai-sdk-demo-ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: openai-sdk-demo-ui
  template:
    metadata:
      labels:
        app: openai-sdk-demo-ui
    spec:
      containers:
        - name: openai-sdk-demo-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ui.port }}
          volumeMounts:
            - name: custom-ca
              mountPath: "/etc/ssl/certs/custom"
              readOnly: true
          env:
            - name: BACKEND_URL
              value: {{ .Values.ui.backendUrl | quote }}

            - name: SSL_CERT_FILE
              value: "/etc/ssl/certs/custom/ca-bundle.crt"
            - name: REQUESTS_CA_BUNDLE
              value: "/etc/ssl/certs/custom/ca-bundle.crt"
      volumes:
        - name: custom-ca
          configMap:
            name: acuvity-ca-bundle
            optional: false
