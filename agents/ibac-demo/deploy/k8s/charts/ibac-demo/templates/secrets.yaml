apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  acuvity_token: {{ required "secrets.acuvity_token is required" .Values.secrets.acuvity_token | quote }}
  anthropic_api_key: {{ .Values.secrets.anthropic_api_key | default "" | quote }}
  openai_api_key: {{ .Values.secrets.openai_api_key | default "" | quote }}
  openrouter_api_key: {{ .Values.secrets.openrouter_api_key | default "" | quote }}
