apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    app: {{ .Release.Name }}-ui
    type: ui
spec:
  type: {{ .Values.service.ui.type }}
  ports:
    - port: {{ .Values.service.ui.port }}
      targetPort: {{ .Values.service.ui.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}-ui
    type: ui
