label: apps/langgraph-demo
apps:
  - name: langgraph-demo
    description: "Langgraph agent application"
    subject:
      - - "@source:namespace=/"
        - "@source:type=mtls"
        - "@source:name=app-tokens"
        - "@org=automated.acuvity.qa"
        - "@scope:project=Devyansh"
        - "@apptoken:name=test"
    tracing: Recording
    otelReceivers:
      - endpoint: "127.0.0.1:4317"
        protocol: GRPC
      - endpoint: "127.0.0.1:4318"
        protocol: HTTP
    selector:
      type: Kubernetes
      kubernetes:
        kubernetesNamespace: langgraph-demo
    components:
      - name: ui
        description: "The UI running a React application."
        kind: Other
        selector:
          type: Kubernetes
          kubernetes:
            name: langgraph-demo-ui
            kubernetesNamespace: langgraph-demo
            type: Deployment
        ingress:
          defaultACLAction: Allow
          ACLs:
            - name: allow-all-external
              IPRanges:
                - "0.0.0.0/0"
              port: 80
              description: "Allow all external requests"
              action: Allow
        egress:
          defaultPolicy:
            ACLAction: Allow
      - name: agent
        description: "The agent running the API server."
        kind: Agent
        selector:
          type: Kubernetes
          kubernetes:
            name: langgraph-demo
            kubernetesNamespace: langgraph-demo
            type: Deployment
        ingress:
          defaultACLAction: Allow
          ACLs:
            - name: allow-all-external
              IPRanges:
                - "0.0.0.0/0"
              port: 80
              description: "Allow all external requests"
              action: Allow
          listeners:
            - port: 8301
              mode: Proxy
              hosts:
                - 127.0.0.1
                - localhost
                - langgraph-demo-svc
                - langgraph-demo-svc.langgraph-demo
                - langgraph-demo-svc.langgraph-demo.svc.cluster.local
              extractors:
                - def:
                    name: chat/request/message
                    type: Input
                    path: "/send"
                    method: Post
                    script: |-
                      function extract()
                        body = json.decode(input.body())
                        return {
                          extractions = { content = body.message },
                        }
                      end
                - def:
                    name: chat/response/message
                    type: Output
                    path: "/send"
                    method: Post
                    script: |-
                      function extract()
                        body = json.decode(input.body())
                        return {
                          extractions = { content = body.output },
                        }
                      end
              proxy:
                listenTLS: Enabled
                dialTLS: Disabled
                defaultPolicyAction: Allow
                policies:
                  - name: allow-all-external
                    description: "Allow all external requests"
                    rules:
                      - action: Allow
                        IPRanges:
                          - "0.0.0.0/0"
        egress:
          defaultPolicy:
            ACLAction: Allow
          policies:
            - name: allow-exa-mcp
              description: "Allow requests to Exa MCP search"
              ACLs:
                - action: Allow
                  hostnames:
                    - "mcp.exa.ai"
            - name: allow-mcp-tools
              description: "Allow requests to MCP tools"
              rules:
                - mode: Proxy
                  proxyAction: Allow
                  appComponents:
                    - "langgraph-demo/mcp-sequential-thinking"
                    - "langgraph-demo/mcp-brave-search"
            - name: allow-groq
              description: "Allow requests to Groq API"
              ACLs:
                - action: Allow
                  hostnames:
                    - "api.groq.com"
      - name: mcp-sequential-thinking
        description: "MCP Server: Sequential Thinking"
        kind: Tool
        selector:
          type: Kubernetes
          kubernetes:
            name: mcp-server-sequential-thinking
            kubernetesNamespace: langgraph-demo
            type: Deployment
        ingress:
          listeners:
            - port: 8000
              mode: Proxy
              hosts:
                - mcp-server-sequential-thinking.langgraph-demo.svc.cluster.local
                - mcp-server-sequential-thinking.langgraph-demo
                - mcp-server-sequential-thinking
              extractors:
                - ref: mcp/input
                - ref: mcp/output
              proxy:
                listenTLS: Disabled
                dialTLS: Disabled
                defaultPolicyAction: Allow
                policies:
                  - name: allow-agent
                    description: "Allow requests from the agent"
                    rules:
                      - action: Allow
                        appComponents:
                          - "langgraph-demo/agent"
        egress:
          defaultPolicy:
            ACLAction: Allow
      - name: mcp-brave-search
        description: "MCP Server: Brave Search"
        kind: Tool
        selector:
          type: Kubernetes
          kubernetes:
            name: mcp-server-brave-search
            kubernetesNamespace: langgraph-demo
            type: Deployment
        ingress:
          listeners:
            - port: 8000
              mode: Proxy
              hosts:
                - mcp-server-brave-search.langgraph-demo.svc.cluster.local
                - mcp-server-brave-search.langgraph-demo
                - mcp-server-brave-search
              extractors:
                - ref: mcp/input
                - ref: mcp/output
              proxy:
                listenTLS: Disabled
                dialTLS: Disabled
                defaultPolicyAction: Allow
                policies:
                  - name: allow-agent
                    description: "Allow requests from the agent"
                    rules:
                      - action: Allow
                        appComponents:
                          - "langgraph-demo/agent"
        egress:
          defaultPolicy:
            ACLAction: Allow
          policies:
            - name: allow-brave-search-api
              description: "Allow requests to Brave Search API"
              ACLs:
                - action: Allow
                  hostnames:
                    - "api.search.brave.com"
