app_name: research_assistant
title: Research Assistant
cors_origins: "*"
instruction: You are a research assistant that can search the web and read from a database
tools:
mcp_servers:
  - name: mcp-brave-search
    description: Search the web for information
    url: http://localhost:8000/sse
  - name: mcp-server-sequential-thinking
    description: Read from a database
    url: http://localhost:8001/sse
otel:
  enabled: true
  service_name: research_assistant_tracer
  send_spans: true
  console_export: true
  no_file_export: false
  file: trace.log
  otlp_endpoint: http://127.0.0.1:4317
  insecure: true
  instrumentors:
    - name: HTTPXClientInstrumentor
    - name: AioHttpClientInstrumentor
    - name: ThreadingInstrumentor
    - name: MCPInstrumentor
    - name: GoogleADKInstrumentor
    - name: LiteLLMInstrumentor
user_id: default_user
api_key: 
  - name: brave_api_key
    value: YOUR_BRAVE_API_KEY
  - name: ANTHROPIC_API_KEY
    value: YOUR_ANTHROPIC_API_KEY
  